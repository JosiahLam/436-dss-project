name: keep-warm
# Pings the Render backend every ~10 min so the free instance never sleeps,
# which eliminates the cold-start wait for visitors.
#
# Setup: in GitHub repo Settings -> Secrets and variables -> Actions ->
# Variables, add a repository variable BACKEND_URL set to your Render URL
# (e.g. https://perch-backend.onrender.com), no trailing slash.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          if [ -z "${{ vars.BACKEND_URL }}" ]; then
            echo "BACKEND_URL repo variable not set; skipping."; exit 0
          fi
          curl -fsS --max-time 60 "${{ vars.BACKEND_URL }}/api/health" || true
